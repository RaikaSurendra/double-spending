services:
  postgres:
    image: postgres:16-alpine
    container_name: double-spending-postgres
    environment:
      POSTGRES_DB: doublespending
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
